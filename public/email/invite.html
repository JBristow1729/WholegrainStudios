<div style="margin:0; padding:0; background:#fdf0dc; color:#3d2b1a; font-family:Inter, Arial, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse; background:#fdf0dc;">
    <tr>
      <td align="center" style="padding:48px 20px 28px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; max-width:640px; border-collapse:collapse;">
          <tr>
            <td align="center" style="padding:0 0 26px;">
              <img src="https://wholegrainstudios.co.uk/images/toast-idle-wave.gif" width="180" alt="Toast mascot waving" style="display:block; width:180px; max-width:48%; height:auto; margin:0 auto; border:0; filter:drop-shadow(0 8px 28px rgba(122,79,40,0.12));">
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 10px;">
              <h1 style="margin:0; color:#3d2b1a; font-family:Nunito, Arial, sans-serif; font-size:40px; line-height:1.15; font-weight:900; text-align:center;">

            </td>
          </tr>
          <tr>
            <td align="center" style="padding:14px 18px 0;">
              <p style="margin:0; color:#4e6e42; font-family:Nunito, Arial, sans-serif; font-size:12px; line-height:1.65; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; text-align:center;">
                We'd love to have you. Join us by clicking the link below.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:32px 0 38px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block; padding:14px 36px; background:#7a9e6e; color:#ffffff; font-family:Nunito, Arial, sans-serif; font-size:16px; line-height:1; font-weight:800; text-align:center; text-decoration:none; border-radius:999px; box-shadow:0 4px 0 #4e6e42;">

            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 0 34px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                <tr>
                  <td style="height:2px; background:#ddc898; line-height:2px; font-size:0;">&nbsp;</td>
                  <td width="56" align="center" style="width:56px; color:#7a4f28; font-size:22px; line-height:1;">&#127806;</td>
                  <td style="height:2px; background:#ddc898; line-height:2px; font-size:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="left" style="padding:0 0 20px; border-top:2px solid #ddc898;">
              <p style="margin:34px 0 0; color:#a08060; font-family:Inter, Arial, sans-serif; font-size:13px; line-height:1.5; text-align:left;">
                Baked fresh by one person &middot; &copy; 2026
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
