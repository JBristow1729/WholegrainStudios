<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Admin · Wholegrain Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-page">
  <main class="admin-shell">
    <a class="admin-back" href="index.html#games">Back to site</a>
    <section class="admin-panel">
      <div class="admin-header">
        <div>
          <p class="section-eyebrow">Bakery admin</p>
          <h1 id="adminTitle">Edit game</h1>
        </div>
        <button class="admin-secondary" type="button" id="logoutButton" hidden>Log out</button>
      </div>

      <div class="admin-login" id="loginPanel">
        <p>Sign in with your approved Wholegrain account to edit the game shelf.</p>
        <button class="hero-cta" type="button" id="loginButton">Sign in</button>
      </div>

      <form class="game-form" id="gameForm" hidden>
        <label>
          <span>Title</span>
          <input name="title" type="text" required>
        </label>
        <label>
          <span>Description</span>
          <textarea name="description" rows="5" required></textarea>
        </label>
        <label>
          <span>Tags</span>
          <input name="tags" type="text" placeholder="Dice, Strategy, Luck">
        </label>
        <label>
          <span>Cover Art</span>
          <input name="coverArt" type="text" placeholder="images/cover-pips.png" required>
        </label>
        <label>
          <span>Link</span>
          <input name="link" type="url" placeholder="https://example.com/">
        </label>
        <div class="form-actions">
          <button class="hero-cta" type="submit">Save game</button>
          <a class="admin-secondary" href="index.html#games">Cancel</a>
        </div>
        <p class="admin-status" id="adminStatus" role="status"></p>
      </form>
    </section>
  </main>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
  <script src="js/admin.js" defer></script>
</body>
</html>
