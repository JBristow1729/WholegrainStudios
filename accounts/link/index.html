<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#fdf0dc">
  <title>Link Account · Wholegrain Studios</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="icon" href="../../images/toast-logo.png">
  <link rel="apple-touch-icon" href="../../images/toast-logo.png">
  <style>
    /* ACCOUNT LINK PAGE */

    .al-body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Main content sits between nav and footer, centred */
    .al-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
    }

    /* The card — mirrors hero::before dashed border treatment */
    .al-card {
      position: relative;
      width: 100%;
      max-width: 560px;
      background: var(--card-bg);
      border: 2.5px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 4px 0 var(--border);
      padding: 52px 48px 44px;
      text-align: center;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    /* Dashed inner border — same trick as .hero::before */
    .al-card::before {
      content: '';
      position: absolute;
      inset: 14px;
      border: 2px dashed var(--border);
      border-radius: 18px;
      pointer-events: none;
      transition: border-color 0.3s;
    }

    /* Everything inside must sit above the ::before pseudo */
    .al-card > * {
      position: relative;
      z-index: 1;
    }

    /* Toast mascot */
    .al-mascot {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .al-mascot img {
      width: clamp(90px, 18vw, 120px);
      height: auto;
      filter: drop-shadow(0 6px 20px var(--shadow));
    }

    /* Eyebrow label — same class as main page */
    .al-card .section-eyebrow {
      margin-bottom: 10px;
    }

    /* Page title */
    .al-title {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--brown);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .al-title .game-name {
      color: var(--tan-dark);
    }

    /* Subtitle copy */
    .al-copy {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.9rem, 2.2vw, 1.05rem);
      font-weight: 600;
      color: var(--text-mid);
      line-height: 1.65;
      margin-bottom: 28px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }


    /* CTA area — login or link+logout */
    .al-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    /* Primary button - identical to .hero-cta on the main page */
    .al-actions .hero-cta {
      width: 100%;
      max-width: 340px;
      justify-content: center;
      border: 0;
      outline: none;
      box-shadow: 0 4px 0 var(--sage-dark);
    }

    .al-actions .hero-cta:hover {
      box-shadow: 0 6px 0 var(--sage-dark);
    }

    .al-actions .hero-cta:active {
      box-shadow: 0 2px 0 var(--sage-dark);
    }

    .al-actions .hero-cta:focus-visible {
      outline: 3px solid var(--sage-light);
      outline-offset: 4px;
    }


    /* Status line - signed in or error text */
    .al-status {
      min-height: 1.4em;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
    }

    /* Divider below card — full width of the constrained column */
    .al-divider {
      width: 100%;
      max-width: 560px;
      margin-top: 40px;
    }

    /* Footer note below divider */
    .al-note {
      max-width: 480px;
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.7;
      text-align: center;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .al-card {
        padding: 40px 24px 36px;
      }
      .al-card::before {
        inset: 10px;
      }
    }
  </style>
</head>
<body class="al-body">

  <nav>
    <a class="nav-logo" href="../../index.html">
      <img class="nav-logo-toast" src="../../images/toast-logo.png" alt="Toast mascot">
      <img class="nav-logo-wordmark" src="../../images/wordmark.png" alt="Wholegrain Studios">
    </a>
    <div class="nav-right">
      <button class="dark-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="dark-toggle-icon icon-sun">☀️</span>
        <span class="dark-toggle-icon icon-moon">🌙</span>
      </button>
    </div>
  </nav>

  <main class="al-main">

    <section class="al-card">

      <div class="al-mascot">
        <img src="../../images/toast-mascot.png" alt="Toast mascot">
      </div>

      <p class="section-eyebrow">Wholegrain Accounts</p>
      <h1 class="al-title" id="linkTitle">Link your account</h1>
      <p class="al-copy" id="linkCopy">Sign in to connect this game profile to your Wholegrain account.</p>
      <div class="al-actions" id="linkActions">
        <button class="hero-cta" type="button" id="linkButton">
          Link account
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <p class="al-status" id="linkStatus" role="status"></p>

    </section>

    <div class="divider al-divider">
      <div class="divider-line"></div>
      <span class="divider-icon">🍞</span>
      <div class="divider-line"></div>
    </div>

    <p class="al-note">Wholegrain accounts keep your game profiles connected across every title without adding a separate login to each game.</p>

  </main>

  <footer>
    <span class="footer-note">Baked fresh by one person &middot; &copy; 2026</span>
  </footer>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
  <script src="../../js/account-link.js" defer></script>
</body>
</html>
