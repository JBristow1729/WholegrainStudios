<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#fdf0dc">
  <title>Link Account &middot; Wholegrain Studios</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="icon" href="../../images/toast-logo.png">
  <link rel="apple-touch-icon" href="../../images/toast-logo.png">
</head>
<body class="al-body">

  <nav>
    <a class="nav-logo" href="../../index.html">
      <img class="nav-logo-toast" src="../../images/toast-logo.png" alt="Toast mascot">
      <img class="nav-logo-wordmark" src="../../images/wordmark.png" alt="Wholegrain Studios">
    </a>
    <div class="nav-right">
      <button class="dark-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="dark-toggle-icon icon-sun">&#9728;&#65039;</span>
        <span class="dark-toggle-icon icon-moon">&#127769;</span>
      </button>
    </div>
  </nav>

  <main class="al-main">

    <section class="al-card">

      <div class="al-mascot">
        <img src="../../images/toast-mascot.png" alt="Toast mascot">
      </div>

      <p class="section-eyebrow">Wholegrain Accounts</p>
      <h1 class="al-title" id="linkTitle">Link your account</h1>
      <p class="al-copy" id="linkCopy">Sign in to connect this game profile to your Wholegrain account.</p>
      <div class="al-actions" id="linkActions">
        <button class="hero-cta" type="button" id="linkButton">
          Link account
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <p class="al-status" id="linkStatus" role="status"></p>

    </section>

    <div class="divider al-divider">
      <div class="divider-line"></div>
      <span class="divider-icon">&#127838;</span>
      <div class="divider-line"></div>
    </div>

    <p class="al-note">Wholegrain accounts keep your game profiles connected across every title without adding a separate login to each game.</p>

  </main>

  <footer>
    <span class="footer-note">Baked fresh by one person &middot; &copy; 2026</span>
  </footer>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
  <script src="../../js/account-link.js" defer></script>
</body>
</html>
